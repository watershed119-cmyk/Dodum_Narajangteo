name: Daily 나라장터 digest

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Override LOOKBACK_DAYS (e.g. 5 to catch up after an outage)
        required: false
        default: "1"
        type: string

  schedule:
    - cron: "30 23 * * *" # 매일 08:30 KST (UTC 23:30)

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore sent-notice state
        uses: actions/cache@v5
        with:
          path: .state
          key: narajangteo-state-${{ github.ref_name }}
          restore-keys: |
            narajangteo-state-

      - name: Install app
        run: pip install .

      - name: Send digest
        env:
          NARA_API_KEY: ${{ secrets.NARA_API_KEY }}
          NARA_KEYWORDS: ${{ secrets.NARA_KEYWORDS }}
          NARA_EXCLUDE_KEYWORDS: ${{ secrets.NARA_EXCLUDE_KEYWORDS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          LOOKBACK_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.lookback_days || '1' }}
          STATE_FILE: .state/sent.json
        run: narajangteo --force-send-empty
